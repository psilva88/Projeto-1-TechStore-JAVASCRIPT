<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Cadastro de Hardware</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>TechStore</h1>
    <h1>Cadastro de Componentes</h1>
    
    <form id="form">
        <label for="nomeProduto">Nome do Produto:</label>
        <input type="text" id="nomeProduto" placeholder="Ex: Placa de Vídeo Gigabyte, Processador AMD, SSD Kingston" />

        <label for="categoria">Categoria:</label>
        <select name="categoria" id="categoria">
            <option value="">Selecione uma categoria...</option>
            <option value="gpu">Placa de Vídeo (GPU)</option>
            <option value="cpu">Processador (CPU)</option>
            <option value="mb">Placa Mãe</option>
            <option value="ram">Memória RAM</option>
            <option value="storage">Armazenamento (SSD/NVMe)</option>
            <option value="psu">Fonte de Alimentação</option>
        </select>

        <label for="marca">Marca/Fabricante:</label>
        <input type="text" id="marca" placeholder="Ex: MSI, AMD, Intel" />

        <label for="modelo">Modelo:</label>
        <input type="text" id="modelo" placeholder="Ex: RTX 5070 EAGLE OC SFF, Ryzen 5 3500" />

        <label for="especificacao">Especificação:</label>
        <input type="text" id="especificacao" placeholder="Ex: 12GB, 3.6GHz, 16GB 3200MHz, 1TB" />

        <label for="preco">Preço (R$):</label>
        <input type="number" id="preco" step="0.01" min="0" placeholder="0.00" />

        <label for="estoque">Quantidade em Estoque:</label>
        <input type="number" id="estoque" min="0" placeholder="Ex: 5" />

        <label for="sku">Código do Produto (SKU):</label>
        <input type="text" id="sku" placeholder="Ex: GB-5070-12G, AMD-R5-3500" />

        <label for="dataCadastro">Data de Cadastro:</label>
        <input type="date" id="dataCadastro" />

        <label for="descricao">Descrição Detalhada:</label>
        <textarea name="descricao" id="descricao" placeholder="Detalhes técnicos adicionais sobre a peça..."></textarea>

        <button type="submit">Cadastrar Produto</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
